name: Validate Memory System

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validator dependency
        run: |
          python3 -m pip install -r requirements.txt

      - name: Bootstrap smoke test
        run: |
          bash scripts/bootstrap.sh /tmp/agent-memory
          test -f /tmp/agent-memory/memories/memory_index.md
          python3 scripts/validate_memory.py --root /tmp/agent-memory --policy checks/policy.json

      - name: Validate sanitized examples
        run: |
          python3 scripts/validate_memory.py --root examples/sanitized-memory --policy checks/policy.json

      - name: Run validator fixtures
        run: |
          python3 tests/run_validator_fixtures.py
